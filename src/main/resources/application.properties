spring.application.name=cpi-backend

# Railway injects DATABASE_URL, PGUSER, PGPASSWORD automatically when PostgreSQL is attached.
# These fallbacks allow local development with a local PostgreSQL instance.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/cpi_db}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:8f2a5c4e9d7b1a3f6c8e0d2b4a6f8c0e2d4b6a8c0e2d4f6a8c0e2d4f6a8c0e2d}
jwt.expiration=86400000

# Railway dynamically assigns PORT. Fall back to 8080 for local dev.
server.port=${PORT:8080}
