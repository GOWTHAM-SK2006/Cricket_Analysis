spring.application.name=cpi-backend

spring.datasource.url=${SPRING_DATASOURCE_HIKARI_JDBC_URL:jdbc:postgresql://localhost:5432/cpi_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:8f2a5c4e9d7b1a3f6c8e0d2b4a6f8c0e2d4b6a8c0e2d4f6a8c0e2d4f6a8c0e2d}
jwt.expiration=86400000

server.port=8080
